syntax = "proto3";

package kaggen.p2p;

option go_package = "github.com/yourusername/kaggen/internal/p2p/proto";

// ChatMessage is sent from client to server to initiate a chat request.
message ChatMessage {
  // Unique message identifier (generated by client).
  string id = 1;

  // Session identifier for conversation continuity.
  // If empty, server assigns based on peer ID.
  string session_id = 2;

  // User identifier (optional, defaults to peer ID).
  string user_id = 3;

  // Text content of the message.
  string content = 4;

  // Event ID to reply to (for thread forking).
  string reply_to_event_id = 5;

  // Key-value metadata (values are JSON-encoded bytes).
  map<string, bytes> metadata = 6;

  // File attachments.
  repeated Attachment attachments = 7;
}

// Attachment represents a file attached to a message.
message Attachment {
  // Original filename.
  string filename = 1;

  // MIME type (e.g., "image/jpeg").
  string mime_type = 2;

  // Raw file data.
  bytes data = 3;
}

// ChatResponse is streamed from server to client.
message ChatResponse {
  // Unique response identifier.
  string id = 1;

  // ID of the message this responds to.
  string message_id = 2;

  // Session identifier.
  string session_id = 3;

  // Response content (text, error message, JSON for tool calls, etc.).
  string content = 4;

  // Response type: session, text, done, error, tool_call, tool_result,
  // thread_created, approval_required.
  string type = 5;

  // True if this is the final response for the message.
  bool done = 6;

  // Additional metadata (JSON-encoded values).
  map<string, bytes> metadata = 7;
}
