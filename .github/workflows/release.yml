name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-darwin-arm64:
    runs-on: macos-14  # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: |
          CGO_ENABLED=1 go build -tags fts5 \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o kaggen-darwin-arm64 ./cmd/kaggen

      - name: Package
        run: |
          tar czf kaggen-darwin-arm64.tar.gz kaggen-darwin-arm64
          shasum -a 256 kaggen-darwin-arm64.tar.gz > kaggen-darwin-arm64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: |
            kaggen-darwin-arm64.tar.gz
            kaggen-darwin-arm64.tar.gz.sha256

  build-darwin-amd64:
    runs-on: macos-13  # Intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: |
          CGO_ENABLED=1 go build -tags fts5 \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o kaggen-darwin-amd64 ./cmd/kaggen

      - name: Package
        run: |
          tar czf kaggen-darwin-amd64.tar.gz kaggen-darwin-amd64
          shasum -a 256 kaggen-darwin-amd64.tar.gz > kaggen-darwin-amd64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-amd64
          path: |
            kaggen-darwin-amd64.tar.gz
            kaggen-darwin-amd64.tar.gz.sha256

  release:
    needs: [build-darwin-arm64, build-darwin-amd64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create checksums
        run: cat *.sha256 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            kaggen-darwin-arm64.tar.gz
            kaggen-darwin-amd64.tar.gz
            checksums.txt
